# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

orbs:
  # The Node.js orb contains a set of prepackaged CircleCI configuration you can utilize
  # Orbs reduce the amount of configuration required for common tasks.
  # See the orb documentation here: https://circleci.com/developer/orbs/orb/circleci/node
  node: circleci/node@7.2.1
  kubernetes: circleci/kubernetes@1.3.1

commands:
  load_deps_image:
    description: "Load the Therr dependencies image and tag it as latest"
    parameters:
      for:
        type: string
    steps:
      - run:
          name: Load Therr Deps image
          command: |
            echo Loading dependencies image for << parameters.for >> Therr services
            docker image load < "images/therr_deps_${CIRCLE_SHA1}"
      - run:
         name: Tag Therr Deps image locally
         command: |
           docker tag "therrapp/service-dependencies:${CIRCLE_SHA1}" "therrapp/service-dependencies:latest"

jobs:
  docker_build_base_image:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run:
          name: Build Docker Dependencies Image
          command: docker build -t "therrapp/service-dependencies:${CIRCLE_SHA1}" .
      - run:
          name: Save Docker Dependencies Image as tar
          command: |
            mkdir -p images
            docker image save -o "images/therr_deps_${CIRCLE_SHA1}" "therrapp/service-dependencies:${CIRCLE_SHA1}"
      - persist_to_workspace:
          root: ~/
          paths:
            - project
            - images
  test_libraries:
    docker:
      - image: cimg/go:1.24.4
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - load_deps_image:
          for: testing
      - run:
          name: Inspect loaded Docker image
          command: docker image ls
      - run:
          name: Run Unit Tests - JS Utilities Library
          command: docker run -it therrapp/service-dependencies /bin/sh -c 'cd therr-public-library/therr-js-utilities/; npm test'
      - run:
          name: Run Unit Tests - React Library
          command: docker run -it therrapp/service-dependencies /bin/sh -c 'cd therr-public-library/therr-react/; npm test'
      - persist_to_workspace:
          root: ~/
          paths:
            - project
  build_and_test_changed_services:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
      GIT_SHA: << pipeline.git.revision >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - load_deps_image:
          for: building and testing
      - run:
          name: Build Docker images for changed services
          command: ./_bin/cicd/build-changed-services.sh
      - run:
          name: Run unit tests for changed services
          command: ./_bin/cicd/test-changed-services-unit.sh
  lint_changed_files:
    docker:
      - image: cimg/node:24.12.0
    steps:
      - checkout
      - run:
          name: Lint changed files
          command: ./_bin/cicd/lint-changed-files.sh
  docker_build_test_publish_images:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
      GIT_SHA: << pipeline.git.revision >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
            at: ~/
      - load_deps_image:
          for: building
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run:
          name: Build Microservice Docker Images
          command: ./_bin/cicd/build.sh
      - run:
          name: Run Unit Tests on Microservices
          command: ./_bin/cicd/test-microservices-unit.sh
      - run:
          name: Run Integration Tests on Microservices
          command: ./_bin/cicd/test-microservices-integration.sh
      - add_ssh_keys:
          fingerprints:
            - "7a:7c:76:bd:7b:be:2a:cd:de:90:c4:16:78:e1:eb:f6"
      - run:
          name: Publish Docker Images
          command: ./_bin/cicd/publish.sh
  test-e2e-staging:
    docker:
      - image: google/cloud-sdk
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
    steps:
      - attach_workspace:
            at: ~/
      - run:
          name: Apply Stage w/ Kubectl
          # This should pull the latest images (verify and determine if necessary to set image with commit SHA)
          # command: kubectl apply -f k8s/test && kubectl wait -f k8s/test --for=condition=ContainersReady --timeout=1s
          command: echo "Hello, Apply Kubectl"
      - run:
          name: Run Integration Tests
          command: echo "Hello, Integration Tests"
  eas_build_therr_android:
    docker:
      - image: cimg/node:24.12.0
    steps:
      - checkout
      - run:
          name: Skip unless TherrMobile or shared libraries changed
          # This job runs on every stage->main merge (alongside `deploy`), but the
          # Therr mobile app only needs a rebuild when the code it bundles changed:
          # TherrMobile/ itself, or any of the shared libs in therr-public-library/
          # (therr-react and its transitive deps therr-js-utilities + therr-styles,
          # all compiled into the JS bundle). Pure-backend deploys (therr-services/,
          # therr-api-gateway/) must NOT burn an EAS build. stage->main is a real
          # merge commit, so HEAD^1 is the previous main tip and `HEAD^1..HEAD` is
          # exactly the delta merged in. If HEAD^1 can't be resolved (shallow clone),
          # fail open and build rather than silently skip.
          command: |
            BASE="$(git rev-parse --verify --quiet HEAD^1 || true)"
            if [ -z "$BASE" ]; then
              echo "Could not resolve HEAD^1 (shallow clone?) — building to be safe."
            elif git diff --name-only "$BASE" HEAD | grep -qE '^(TherrMobile/|therr-public-library/)'; then
              echo "TherrMobile/ or therr-public-library/ changed in this merge — proceeding with EAS build."
            else
              echo "No TherrMobile/ or therr-public-library/ changes in this merge — skipping EAS build."
              circleci-agent step halt
            fi
      - run:
          name: Install EAS CLI
          # cimg/node runs as the non-root `circleci` user, which cannot write to
          # the global npm prefix (/usr/local/lib/node_modules) -> EACCES. cimg
          # images grant passwordless sudo, so install globally as root. Pin the
          # version for reproducible CI (eas.json requires >= 15.0.0).
          command: sudo npm install -g eas-cli@18.11.0
      - run:
          name: Build THERR Android (EAS cloud build)
          # EXPO_TOKEN must be set as a CircleCI project-level environment variable.
          # GOOGLE_APIS_ANDROID_KEY must be stored as an EAS env var attached to the
          # build's environment (see docs/SECRETS_AND_LOCAL_BOOTSTRAP.md).
          #
          # --auto-submit submits the built AAB to the Play Internal track using
          # the `therr-internal` submit profile in eas.json. Requires the Google
          # Play service-account key to be configured on EAS (already done).
          command: |
            cd TherrMobile
            eas build \
              --platform android \
              --profile therr-internal \
              --non-interactive \
              --auto-submit
      - run:
          name: Populate Google Play release notes
          # EAS Submit uploads the AAB but does NOT set the user-facing "What's
          # new" release notes. This step pushes them to the same internal-track
          # release via the Google Play Developer API, reading the text from
          # TherrMobile/fastlane/metadata/android/<locale>/changelogs/. The
          # script is zero-dependency (Node built-ins only), polls until the
          # EAS submission lands the versionCode on the track, and exits 0
          # (skips) if GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured.
          #
          # GOOGLE_PLAY_SERVICE_ACCOUNT_JSON must be set as a CircleCI
          # project-level env var: the full Play service-account key JSON with
          # the "Release manager" permission (see docs/SECRETS_AND_LOCAL_BOOTSTRAP.md).
          command: |
            if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
              echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set — skipping release-notes population."
            else
              node TherrMobile/_scripts/populate-play-release-notes.mjs
            fi

  deploy:
    docker:
      - image: cimg/gcp:2025.01
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
            at: ~/
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run: 
          name: Login to Google Cloud and connect to GKE Cluster
          command: |
            gke-gcloud-auth-plugin --version
            echo "export USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> ~/.bashrc
            source ~/.bashrc
            echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
            gcloud --quiet config set project therr-app
            gcloud --quiet config set compute/zone us-central1-a
            gcloud container clusters get-credentials cluster-1
      - add_ssh_keys:
          fingerprints:
            - "7a:7c:76:bd:7b:be:2a:cd:de:90:c4:16:78:e1:eb:f6"
      - run:
          name: Deploy Changes To GKE
          command: ./_bin/cicd/deploy.sh

workflows:
  # Below is the definition of your workflow.
  # Inside the workflow, you provide the jobs you want to run, e.g this workflow runs the build-and-test job above.
  # CircleCI will run this workflow on every commit.
  # For more details on extending your workflow, see the configuration docs: https://circleci.com/docs/2.0/configuration-reference/#workflows
  build_test_publish_deploy:
    jobs:
      - docker_build_base_image:
          filters:
            branches:
              ignore:
                - main
      - test_libraries:
          requires:
          - docker_build_base_image
          filters:
            branches:
              ignore:
                - stage
                - main
      - build_and_test_changed_services:
          requires:
          - docker_build_base_image
          filters:
            branches:
              ignore:
                - general
                - stage
                - main
      - lint_changed_files:
          filters:
            branches:
              ignore:
                - general
                - stage
                - main
      - docker_build_test_publish_images:
          requires:
          - docker_build_base_image
          filters:
            branches:
              only:
                - stage
      - test-e2e-staging:
          requires:
          - docker_build_test_publish_images
          - docker_build_base_image
          filters:
            branches:
              only:
                - stage
      - deploy:
          filters:
            branches:
              only:
                - main

  therr_mobile_release:
    jobs:
      - eas_build_therr_android:
          filters:
            branches:
              only:
                - main
