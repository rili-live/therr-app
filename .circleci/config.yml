# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

orbs:
  # The Node.js orb contains a set of prepackaged CircleCI configuration you can utilize
  # Orbs reduce the amount of configuration required for common tasks.
  # See the orb documentation here: https://circleci.com/developer/orbs/orb/circleci/node
  node: circleci/node@7.2.1
  kubernetes: circleci/kubernetes@1.3.1

commands:
  load_deps_image:
    description: "Load the Therr dependencies image and tag it as latest"
    parameters:
      for:
        type: string
    steps:
      - run:
          name: Load Therr Deps image
          command: |
            echo Loading dependencies image for << parameters.for >> Therr services
            docker image load < "images/therr_deps_${CIRCLE_SHA1}"
      - run:
         name: Tag Therr Deps image locally
         command: |
           docker tag "therrapp/service-dependencies:${CIRCLE_SHA1}" "therrapp/service-dependencies:latest"

jobs:
  docker_build_base_image:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run:
          name: Build Docker Dependencies Image
          command: docker build -t "therrapp/service-dependencies:${CIRCLE_SHA1}" .
      - run:
          name: Save Docker Dependencies Image as tar
          command: |
            mkdir -p images
            docker image save -o "images/therr_deps_${CIRCLE_SHA1}" "therrapp/service-dependencies:${CIRCLE_SHA1}"
      - persist_to_workspace:
          root: ~/
          paths:
            - project
            - images
  test_libraries:
    docker:
      - image: cimg/go:1.24.4
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - load_deps_image:
          for: testing
      - run:
          name: Inspect loaded Docker image
          command: docker image ls
      - run:
          name: Run Unit Tests - JS Utilities Library
          command: docker run -it therrapp/service-dependencies /bin/sh -c 'cd therr-public-library/therr-js-utilities/; npm test'
      - run:
          name: Run Unit Tests - React Library
          command: docker run -it therrapp/service-dependencies /bin/sh -c 'cd therr-public-library/therr-react/; npm test'
      - persist_to_workspace:
          root: ~/
          paths:
            - project
  build_and_test_changed_services:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
      GIT_SHA: << pipeline.git.revision >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - load_deps_image:
          for: building and testing
      - run:
          name: Build Docker images for changed services
          command: ./_bin/cicd/build-changed-services.sh
      - run:
          name: Run unit tests for changed services
          command: ./_bin/cicd/test-changed-services-unit.sh
  lint_changed_files:
    docker:
      - image: cimg/node:24.12.0
    steps:
      - checkout
      - run:
          name: Lint changed files
          command: ./_bin/cicd/lint-changed-files.sh
  docker_build_test_publish_images:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
      GIT_SHA: << pipeline.git.revision >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
            at: ~/
      - load_deps_image:
          for: building
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run:
          name: Build Microservice Docker Images
          command: ./_bin/cicd/build.sh
      - run:
          name: Run Unit Tests on Microservices
          command: ./_bin/cicd/test-microservices-unit.sh
      - run:
          name: Run Integration Tests on Microservices
          command: ./_bin/cicd/test-microservices-integration.sh
      - run:
          name: Run Campaign E2E Suite (full, cross-service)
          # Uses therr-ci-network + postgres-ci + redis-ci set up by the
          # integration tests above. Runs the Treasure Hunt launch flows
          # against the built api-gateway image.
          command: ./_bin/cicd/test-campaign-e2e.sh full
      - add_ssh_keys:
          fingerprints:
            - "7a:7c:76:bd:7b:be:2a:cd:de:90:c4:16:78:e1:eb:f6"
      - run:
          name: Publish Docker Images
          command: ./_bin/cicd/publish.sh
  test-e2e-critical-path:
    docker:
      - image: cimg/go:1.24.4
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
      GIT_SHA: << pipeline.git.revision >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: ~/
      - load_deps_image:
          for: e2e-critical
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run:
          name: Build API Gateway Image for E2E
          command: ./_bin/cicd/build-changed-services.sh
      - run:
          name: Setup Test DB Infrastructure
          command: ./_bin/cicd/setup-test-db.sh
      - run:
          name: Run Critical-Path Campaign E2E (referral + QR + incentive)
          # Fast subset on every PR to catch the 3 highest-stakes regressions
          # (referral payout, QR check-in, Space Incentive redemption).
          command: ./_bin/cicd/test-campaign-e2e.sh critical
      - run:
          name: Teardown Test DB Infrastructure
          command: ./_bin/cicd/teardown-test-db.sh
          when: always
  eas_build_android_preview:
    docker:
      - image: cimg/node:24.12.0
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
    steps:
      - checkout
      - run:
          name: Install EAS CLI
          command: npm install -g eas-cli
      - run:
          name: Build Android Preview APK via EAS (free tier)
          # Publishes an internal-distribution APK for partner testers. Uses
          # EAS Build free tier (30 builds/mo). EXPO_TOKEN is configured in
          # the CircleCI context.
          command: |
            cd TherrMobile
            eas build --platform android --profile preview --non-interactive
  deploy:
    docker:
      - image: cimg/gcp:2025.01
        auth:
          username: $DOCKERHUB_USER
          password: $DOCKERHUB_PASSWORD
    environment:
      CICD_BRANCH: << pipeline.git.branch >>
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
            at: ~/
      - run:
          name: Login to DockerHub
          command: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USER" --password-stdin
      - run: 
          name: Login to Google Cloud and connect to GKE Cluster
          command: |
            gke-gcloud-auth-plugin --version
            echo "export USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> ~/.bashrc
            source ~/.bashrc
            echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
            gcloud --quiet config set project therr-app
            gcloud --quiet config set compute/zone us-central1-a
            gcloud container clusters get-credentials cluster-1
      - add_ssh_keys:
          fingerprints:
            - "7a:7c:76:bd:7b:be:2a:cd:de:90:c4:16:78:e1:eb:f6"
      - run:
          name: Deploy Changes To GKE
          command: ./_bin/cicd/deploy.sh

workflows:
  # Below is the definition of your workflow.
  # Inside the workflow, you provide the jobs you want to run, e.g this workflow runs the build-and-test job above.
  # CircleCI will run this workflow on every commit.
  # For more details on extending your workflow, see the configuration docs: https://circleci.com/docs/2.0/configuration-reference/#workflows
  build_test_publish_deploy:
    jobs:
      - docker_build_base_image:
          filters:
            branches:
              ignore:
                - main
      - test_libraries:
          requires:
          - docker_build_base_image
          filters:
            branches:
              ignore:
                - stage
                - main
      - build_and_test_changed_services:
          requires:
          - docker_build_base_image
          filters:
            branches:
              ignore:
                - general
                - stage
                - main
      - lint_changed_files:
          filters:
            branches:
              ignore:
                - general
                - stage
                - main
      - docker_build_test_publish_images:
          requires:
          - docker_build_base_image
          filters:
            branches:
              only:
                - stage
      - test-e2e-critical-path:
          # Runs the campaign-critical subset on every PR (not on stage/main
          # where the full suite runs as part of docker_build_test_publish_images).
          requires:
          - docker_build_base_image
          filters:
            branches:
              ignore:
                - general
                - stage
                - main
      - eas_build_android_preview:
          # Produce an installable Android APK for campaign partner testers
          # whenever we publish new stage images.
          requires:
          - docker_build_test_publish_images
          filters:
            branches:
              only:
                - stage
      - deploy:
          filters:
            branches:
              only:
                - main
