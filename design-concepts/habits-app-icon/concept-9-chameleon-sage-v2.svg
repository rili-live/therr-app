<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="s2-body" x1="200" y1="240" x2="824" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5E4575"/>
      <stop offset="55%"  stop-color="#6E5C85"/>
      <stop offset="100%" stop-color="#837594"/>
    </linearGradient>
    <linearGradient id="s2-stripe" x1="490" y1="295" x2="534" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F6C84A"/>
      <stop offset="100%" stop-color="#D79A20"/>
    </linearGradient>
  </defs>

  <!-- White rounded-square background -->
  <rect width="1024" height="1024" rx="225" fill="#FFFFFF"/>

  <!-- Equilateral triangle head with rounded corners.
       Vertices: apex (512,240), bottom-left (192,794), bottom-right (832,794).
       Corner radius ~80px. Quadratic curves use the raw vertex as the control. -->
  <path d="M 472 309
           Q 512 240 552 309
           L 792 725
           Q 832 794 752 794
           L 272 794
           Q 192 794 232 725
           Z"
        fill="url(#s2-body)"/>

  <!-- Yellow forehead stripe (pill), vertical, centered -->
  <rect x="487" y="308" width="50" height="196" rx="25" fill="url(#s2-stripe)"/>

  <!-- Left eye: large body-color bulge sitting outside the triangle's left slope -->
  <circle cx="235" cy="582" r="138" fill="url(#s2-body)"/>
  <circle cx="235" cy="582" r="92"  fill="#FFFFFF"/>
  <circle cx="252" cy="588" r="42"  fill="#2E2140"/>
  <circle cx="265" cy="576" r="14"  fill="#FFFFFF"/>

  <!-- Right eye: mirror, extending past right slope -->
  <circle cx="789" cy="582" r="138" fill="url(#s2-body)"/>
  <circle cx="789" cy="582" r="92"  fill="#FFFFFF"/>
  <circle cx="772" cy="588" r="42"  fill="#2E2140"/>
  <circle cx="759" cy="576" r="14"  fill="#FFFFFF"/>

  <!-- Reptile nostrils: two small dots -->
  <circle cx="485" cy="712" r="11" fill="#2E2140" opacity="0.62"/>
  <circle cx="539" cy="712" r="11" fill="#2E2140" opacity="0.62"/>

  <!-- Simple bell-curve smile -->
  <path d="M 438 766 Q 512 808 586 766"
        stroke="#2E2140" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
