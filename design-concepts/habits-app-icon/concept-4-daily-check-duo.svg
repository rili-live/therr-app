<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Friends With Habits — Daily Check Duo">
  <title>Friends With Habits — Daily Check Duo</title>

  <!-- Teal app-icon background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#1C7F8A"/>

  <!-- Top highlight band -->
  <rect x="0" y="0" width="1024" height="420" rx="224" ry="224" fill="#22A5B4" opacity="0.22"/>

  <!-- Progress ring track (faint) -->
  <circle cx="512" cy="472" r="240" fill="none" stroke="#FCFEFF" stroke-width="56" opacity="0.22"/>

  <!-- Progress ring fill — ~85% complete, starting at top, sweeping clockwise.
       Circumference ≈ 2π·240 ≈ 1508. 85% ≈ 1282, gap ≈ 226. -->
  <circle cx="512" cy="472" r="240" fill="none" stroke="#FCFEFF" stroke-width="56"
          stroke-linecap="round"
          stroke-dasharray="1282 1508"
          transform="rotate(-90 512 472)"/>

  <!-- Checkmark — the daily habit completed -->
  <path d="M 388 472 L 484 568 L 644 392"
        fill="none" stroke="#E37107" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two partner dots at the base — the pact -->
  <circle cx="416" cy="820" r="52" fill="#FCFEFF"/>
  <circle cx="608" cy="820" r="52" fill="#E37107"/>

  <!-- Connecting bond between partners -->
  <rect x="468" y="810" width="88" height="20" rx="10" ry="10" fill="#FCFEFF"/>
</svg>
