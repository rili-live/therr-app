<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="s3-body" x1="180" y1="240" x2="844" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5B4273"/>
      <stop offset="55%"  stop-color="#6E5C85"/>
      <stop offset="100%" stop-color="#7C8094"/>
    </linearGradient>
    <linearGradient id="s3-stripe" x1="490" y1="355" x2="534" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F6C94A"/>
      <stop offset="100%" stop-color="#D49617"/>
    </linearGradient>
  </defs>

  <!-- White rounded-square background -->
  <rect width="1024" height="1024" rx="225" fill="#FFFFFF"/>

  <!-- Rounded-equilateral-triangle head.
       Vertices A(512,240), B(192,794), C(832,794); corner radius r=130
       (up from 80) to soften all three corners and the apex. -->
  <path d="M 447 353
           Q 512 240 577 353
           L 767 681
           Q 832 794 702 794
           L 322 794
           Q 192 794 257 681
           Z"
        fill="url(#s3-body)"/>

  <!-- Yellow forehead stripe: slightly tapered pill, centered, starts
       below the softened apex -->
  <path d="M 494 360
           Q 494 340 512 340
           Q 530 340 530 360
           L 525 512
           Q 525 528 512 528
           Q 499 528 499 512
           Z"
        fill="url(#s3-stripe)"/>

  <!-- Left eye: raised (y 582 -> 545), enlarged, pulled inward for better
       fusion with the head silhouette. Pupil drifts inward for the
       classic chameleon independent-eye look. -->
  <circle cx="260" cy="545" r="148" fill="url(#s3-body)"/>
  <circle cx="260" cy="545" r="95"  fill="#FFFFFF"/>
  <circle cx="280" cy="552" r="44"  fill="#2E2140"/>
  <circle cx="294" cy="539" r="15"  fill="#FFFFFF"/>
  <circle cx="272" cy="560" r="5"   fill="#FFFFFF" opacity="0.8"/>

  <!-- Right eye: mirror -->
  <circle cx="764" cy="545" r="148" fill="url(#s3-body)"/>
  <circle cx="764" cy="545" r="95"  fill="#FFFFFF"/>
  <circle cx="744" cy="552" r="44"  fill="#2E2140"/>
  <circle cx="730" cy="539" r="15"  fill="#FFFFFF"/>
  <circle cx="752" cy="560" r="5"   fill="#FFFFFF" opacity="0.8"/>

  <!-- Reptile nostrils: two small dots, raised in step with the eyes -->
  <circle cx="488" cy="688" r="11" fill="#2E2140" opacity="0.62"/>
  <circle cx="536" cy="688" r="11" fill="#2E2140" opacity="0.62"/>

  <!-- Simple bell-curve smile, slightly wider and gentler -->
  <path d="M 432 758 Q 512 804 592 758"
        stroke="#2E2140" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
