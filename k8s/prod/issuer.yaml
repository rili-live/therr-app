apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: default
spec:
  acme:
    # You must replace this email address with your own.
    # Let's Encrypt will use this to contact you about expiring
    # certificates, and issues related to your account.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "info@therr.com"
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    # DNS-01 via Cloudflare API token. Preferred because it is unaffected
    # by Cloudflare proxy status, supports wildcards, and does not require
    # the origin to be reachable on port 80 during issuance.
    # Requires secret `cloudflare-api-token-secret` in the cert-manager
    # namespace with key `api-token` holding a token scoped to:
    #   Zone:Zone:Read (all zones)
    #   Zone:DNS:Edit  (therr.com)
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
      selector:
        dnsZones:
        - 'therr.com'
        # Whitelabel
        # - 'adsly.app'
