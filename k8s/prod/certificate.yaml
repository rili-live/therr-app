apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: therr-network-tls
  namespace: default
spec:
  secretName: therr-network-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - 'therr.com'
    - 'www.therr.com'
    - 'dashboard.therr.com'
    - 'api.therr.com'
    - 'websocket-service.therr.com'
    - 'habits.therr.com'
    - 'www.habits.therr.com'
    # Whitelabel
    # - 'adsly.app'
    # - 'www.adsly.app'
  duration: 4320h # 180d
  renewBefore: 720h # 30d
