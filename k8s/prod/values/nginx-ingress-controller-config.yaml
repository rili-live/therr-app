# nginx-ingress-controller-config.yaml
controller:
  config:
    use-forwarded-headers: "true"
    allow-snippet-annotations: "true"
  service:
    externalTrafficPolicy: "Local"
  nodeSelector:
    cloud.google.com/gke-nodepool: main-pool

# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm install nginx-ingress ingress-nginx/ingress-nginx --namespace ingress-nginx -f nginx-ingress-controller-config.yaml
# helm upgrade nginx-ingress ingress-nginx/ingress-nginx --namespace ingress-nginx -f nginx-ingress-controller-config.yaml