apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      component: web
  template:
    metadata:
      labels:
        component: web
        tier: frontend
        layer: services-external
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: cloud.google.com/gke-preemptible
                operator: Exists
            weight: 100
      nodeSelector:
        cloud.google.com/gke-preemptible: "true"
      containers:
      - name: web
        image: therrapp/client-web:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            memory: "96Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        ports:
        - containerPort: 7070
        - containerPort: 7071
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 7070
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 7070
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        env:
          - name: USERS_SERVICE_API_PORT
            value: "7771"
          - name: CLIENT_PORT
            value: "7070"
          - name: CLIENT_DASHBOARD_PORT
            value: "7071"
          - name: HONEYCOMB_API_KEY
            valueFrom:
              secretKeyRef:
                name: honeycomb-writekey
                key: HONEYCOMB
          - name: IMAGE_KIT_URL
            value: "https://ik.imagekit.io/qmtvldd7sl/"
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: "grpc"
          - name: LOG_LEVEL
            value: "info"
          - name: SOCKET_PORT
            value: "7743"
          # SEO: Search engine verification codes (get from each search console after registering)
          # Google: https://search.google.com/search-console → Settings → Ownership verification → HTML tag
          - name: GOOGLE_SITE_VERIFICATION
            value: ""
          # Bing: https://www.bing.com/webmasters → Settings → Ownership verification → HTML meta tag
          - name: BING_SITE_VERIFICATION
            value: ""
          # Pinterest: https://business.pinterest.com → Settings → Claim website
          - name: PINTEREST_VERIFICATION
            value: "29ef104f87eb1d2c0de01fe5ae9968c9"
          # IndexNow: Generate a key at https://www.bing.com/indexnow — alphanumeric+hyphens, 8-128 chars
          # The same key must be set on both client-web (serves key file) and maps-service (submits URLs)
          - name: INDEXNOW_API_KEY
            value: "bf9415ba04c845a797fdc30bc27df2d7"
